<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sirisha Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="topbar">
    <span class="brand">SIRISHA STUDIO</span>
    <span class="back-link">card processor</span>
  </div>

  <h1>Studio</h1>
  <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:0">
    Pick a tool below. Drag &amp; drop files anywhere on the tool page.
    All A4 prints are descaled to {{ (descale * 100)|round(0)|int }}% by default.
  </p>

  <div class="tiles">
    {% for t in tools %}
    <a class="tile" href="{{ t.href }}">
      <div class="t">{{ t.title }}</div>
      <div class="d">{{ t.desc }}</div>
    </a>
    {% endfor %}
  </div>
</body>
</html>
